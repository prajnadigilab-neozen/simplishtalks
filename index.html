<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIMPLISH - Talks | ಕನ್ನಡಿಗರಿಗಾಗಿ ಇಂಗ್ಲಿಷ್</title>
  <meta name="theme-color" content="#ffffff" />
  <link rel="apple-touch-icon" href="/logo-new.png" />
  <link rel="preload" href="/fonts/NotoSansKannada.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/DancingScript-Bold.woff2" as="font" type="font/woff2" crossorigin>
  
  <style>
    @font-face {
      font-family: 'Noto Sans Kannada';
      src: url('/fonts/NotoSansKannada.woff2') format('woff2');
      font-weight: 400;
      font-display: swap;
      unicode-range: U+0951-0952, U+0964-0965, U+0C80-0CF3, U+1CD0, U+1CD2-1CD3, U+1CDA, U+1CF2, U+1CF4, U+200C-200D, U+20B9, U+25CC, U+A830-A835;
    }
    @font-face {
      font-family: 'Noto Sans Kannada';
      src: url('/fonts/NotoSansKannada-Latin.woff2') format('woff2');
      font-weight: 400;
      font-display: swap;
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }
    @font-face {
      font-family: 'Dancing Script';
      src: url('/fonts/DancingScript-Bold.woff2') format('woff2');
      font-weight: 700;
      font-display: swap;
    }

    body {
      font-family: 'Noto Sans Kannada', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
    }

    /* Fix 3: Critical Skeleton Screen */
    #root:empty::before {
      content: '';
      display: block;
      height: 100vh;
      background: linear-gradient(90deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    #root:empty::after {
      content: 'SIMPLISH Talks ಲೋಡ್ ಆಗುತ್ತಿದೆ...';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #f97316;
      font-size: 1.25rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-align: center;
      width: 100%;
    }
  </style>

  <link rel="icon" type="image/png" href="/logo-new.png" />
  <link rel="stylesheet" href="/index.css">
</head>

<body class="bg-gray-50 dark:bg-slate-900 text-gray-900 dark:text-slate-100">
  <picture>
    <source srcset="/brand-image.avif" type="image/avif" />
    <img src="/brand-image.png" alt="SIMPLISH Talks Hero" loading="eager" fetchpriority="high" class="fixed inset-0 w-full h-full object-cover -z-10 opacity-20 pointer-events-none" />
  </picture>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
